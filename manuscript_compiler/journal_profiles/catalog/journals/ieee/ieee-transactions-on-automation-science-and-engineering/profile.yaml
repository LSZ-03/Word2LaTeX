checks:
- id: class-file-and-option-set
  title: Exact class file and option set
  requirement: Verify the actual class file, template package, or sample source used by the journal.
  status: checklist-required
- id: front-matter-structure
  title: Front matter structure
  requirement: Confirm abstract and Index Terms format, author metadata, first-footnote content, and any journal-specific
    front-matter blocks.
  status: checklist-required
- id: body-structure-and-sections
  title: Body structure and section flow
  requirement: Confirm the article body follows the target journal's required section hierarchy, including whether Related
    Work and Discussion should be merged or separated.
  status: checklist-required
- id: figure-table-and-graphics-rules
  title: Figure, table, and graphics rules
  requirement: Confirm caption placement, one-column versus two-column sizing, accepted graphics formats, and supplementary-material
    handling.
  status: checklist-required
- id: references-and-end-matter
  title: References and end matter
  requirement: Confirm IEEE reference styling, acknowledgments, appendices, and whether author biographies are required for
    the target journal.
  status: checklist-required
- id: journal-specific-note
  title: Journal-specific note
  requirement: Verify article limits, optional supplementary files, and any special author instructions.
  status: checklist-required

