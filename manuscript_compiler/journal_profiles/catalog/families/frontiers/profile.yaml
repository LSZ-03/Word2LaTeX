checks:
- id: class-file-and-reference-mode
  title: Class file and reference mode
  requirement: Confirm the target Frontiers title uses the family class path and the appropriate bibliography mode.
  status: verified
- id: frontmatter-and-specialty-metadata
  title: Front matter and specialty metadata
  requirement: Confirm title, authors, affiliations, correspondence, specialty labels, abstract, and keywords follow the target
    Frontiers title.
  status: verified
- id: section-flow-and-open-science-rules
  title: Section flow and open science rules
  requirement: Confirm section hierarchy and all required open-science reporting sections such as data availability, author
    contributions, conflict of interest, and funding.
  status: verified
- id: figure-table-and-manuscript-rules
  title: Figure, table, and manuscript rules
  requirement: Confirm figure handling, caption treatment, and manuscript-style layout expectations follow the target Frontiers
    title.
  status: verified
- id: journal-specific-note
  title: Journal-specific note
  requirement: Use this family baseline only when the exact Frontiers target journal has not yet been fixed; once the venue
    is known, tighten the manuscript against that title's live guidance.
  status: verified

