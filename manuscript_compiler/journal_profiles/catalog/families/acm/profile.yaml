slug: acm
display_name: ACM Family
status: verified
documentclass: article
section_numbering: arabic
section_depth: 3
bibliography_style: mode
bibliography_type: thebibliography
figure_placement: tbp
figure_max_width: 0.9\columnwidth
table_placement: tbp
table_default_align: c
